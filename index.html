<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIR JUNIOR · Cynthia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Quicksand:wght@300;400;600&family=Sacramento&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #e8f5e9;
      background: radial-gradient(circle at 30% 30%, #d4edda, #a5d6a7);
      font-family: 'Quicksand', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.6s ease;
      position: relative;
      overflow-x: hidden;
    }

    /* floating container */
    .floating-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
      visibility: hidden;
    }

    .float-item {
      position: absolute;
      font-size: 2rem;
      opacity: 0;
      animation: floatUp 14s linear infinite;
      color: #66bb6a;
      filter: drop-shadow(0 0 12px #2e7d32);
      user-select: none;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg) scale(0.6); opacity: 0.9; }
      100% { transform: translateY(-20vh) rotate(720deg) scale(1.2); opacity: 0.1; }
    }

    /* GATE */
    .glass-panel {
      background: rgba(232, 245, 233, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 56px;
      border: 1px solid rgba(129, 199, 132, 0.8);
      box-shadow: 0 30px 50px -20px rgba(27, 94, 32, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.7);
      padding: 2.8rem 2.2rem;
      width: 90%;
      max-width: 580px;
      transition: all 0.3s ease;
      position: relative;
      z-index: 20;
    }

    .gate-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      color: #1e3a2a;
    }
    .gate-container h1 {
      font-weight: 500;
      font-size: 2.8rem;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
      text-shadow: 0 4px 15px #81c784;
      color: #1e4a2a;
      font-family: 'Cormorant Garamond', serif;
    }
    .gate-container h1 i { color: #388e3c; margin: 0 12px; filter: drop-shadow(0 0 8px #66bb6a); }
    .gate-container p { font-weight: 400; font-size: 1.3rem; margin-bottom: 2.8rem; color: #1e3a2a; }
    .password-box { width: 100%; margin: 1.2rem 0; }
    .password-input {
      width: 100%;
      padding: 18px 30px;
      border: none;
      border-radius: 60px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(76, 175, 80, 0.5);
      font-size: 1.3rem;
      color: #1a3a1a;
      outline: none;
      transition: 0.25s;
      text-align: center;
      letter-spacing: 2px;
      font-weight: 600;
    }
    .password-input::placeholder { color: rgba(46, 125, 50, 0.6); font-weight: 400; }
    .password-input:focus {
      border-color: #66bb6a;
      box-shadow: 0 0 20px #4caf50, inset 0 0 10px #a5d6a7;
    }
    .enter-btn {
      background: linear-gradient(135deg, #66bb6a, #a5d6a7);
      border: none;
      border-radius: 60px;
      padding: 16px 44px;
      margin: 30px 0 10px;
      font-size: 1.6rem;
      font-weight: 700;
      color: #0f2a12;
      letter-spacing: 2px;
      box-shadow: 0 15px 30px -8px #2e7d32, 0 0 0 1px rgba(200, 230, 200, 0.9);
      cursor: pointer;
      transition: 0.2s;
      width: fit-content;
      border: 1px solid #c8e6c9;
    }
    .enter-btn:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #81c784, #c8e6c9);
      box-shadow: 0 20px 35px -5px #388e3c;
    }
    .error-message {
      min-height: 2.5rem;
      color: #c62828;
      font-weight: 600;
      text-shadow: 0 2px 5px #ffcdd2;
      margin: 5px 0;
    }

    /* heart canvas */
    #heartCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 30;
      display: none;
    }

    /* MAIN PAGE */
    .grace-page {
      display: none;
      width: 100%;
      max-width: 950px;
      padding: 1.8rem;
      animation: softAppear 1s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      z-index: 25;
    }
    @keyframes softAppear {
      0% { opacity: 0; transform: scale(0.95) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .main-inner {
      background: rgba(232, 245, 233, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 70px;
      padding: 2.8rem 2.5rem;
      border: 1px solid rgba(165, 214, 167, 0.9);
      box-shadow: 0 30px 60px -15px #2e7d32;
    }

    .grace-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .grace-header h2 {
      font-size: 4rem;
      font-weight: 700;
      font-family: 'Cormorant Garamond', serif;
      background: linear-gradient(145deg, #1e4a2a, #2e7d32);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px #81c784;
      letter-spacing: 1px;
    }
    .grace-header h2 i {
      color: #388e3c;
      margin: 0 15px;
      font-size: 3.4rem;
      filter: drop-shadow(0 0 18px #66bb6a);
    }

    /* Letter card */
    .letter-card {
      background: rgba(232, 245, 233, 0.85);
      backdrop-filter: blur(16px);
      border: 2px solid #81c784;
      border-radius: 60px;
      padding: 2rem 2.2rem;
      margin: 30px 0 20px;
      cursor: pointer;
      transition: 0.3s;
      text-align: center;
      box-shadow: 0 25px 40px -14px #2e7d32;
    }
    .letter-card:hover {
      transform: scale(1.02);
      border-color: #4caf50;
      box-shadow: 0 35px 50px -10px #1b5e20;
    }
    .letter-card i {
      font-size: 4rem;
      background: linear-gradient(135deg, #2e7d32, #1b5e20);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }
    .letter-card h3 {
      font-size: 2.8rem;
      font-family: 'Cormorant Garamond', serif;
      color: #1e3a2a;
    }
    .letter-card p {
      font-size: 1.3rem;
      color: #1e4a2a;
    }

    /* Letter display */
    .letter-paper {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 48px;
      padding: 2.5rem;
      border: 1px solid #81c784;
      box-shadow: inset 0 0 30px #c8e6c9, 0 25px 40px -15px #2e7d32;
      margin: 30px 0 40px;
      font-family: 'Cormorant Garamond', serif;
    }
    .letter-content {
      font-size: 1.5rem;
      line-height: 1.7;
      color: #0f2a12;
      white-space: pre-line;
      font-weight: 500;
    }

    /* POSTER: girl of the day — Cynthia */
    .poster-grace {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 40px 0 20px;
      padding: 3rem 2rem;
      background: linear-gradient(145deg, #c8e6c9, #a5d6a7);
      border-radius: 80px 80px 40px 40px;
      border: 4px solid #66bb6a;
      box-shadow: 0 0 70px #4caf50, 0 20px 40px -5px #2e7d32;
      text-align: center;
      transform: scale(1);
      transition: 0.3s;
    }
    .poster-grace:hover {
      transform: scale(1.02);
      box-shadow: 0 0 100px #388e3c, 0 25px 50px -5px #1b5e20;
    }
    .poster-title {
      font-size: 3.5rem;
      font-weight: 300;
      letter-spacing: 8px;
      color: #1a3a1a;
      font-family: 'Quicksand', sans-serif;
      text-transform: uppercase;
      background: rgba(255,255,240,0.3);
      padding: 0.3rem 2rem;
      border-radius: 50px;
      backdrop-filter: blur(4px);
    }
    .poster-name {
      font-size: 7rem;
      font-weight: 700;
      font-family: 'Sacramento', cursive;
      color: #1a3a1a;
      line-height: 1.2;
      text-shadow: 0 4px 20px #a5d6a7, 0 8px 30px #4caf50;
      margin: 0.5rem 0 0.2rem;
    }
    .poster-sub {
      font-size: 2.2rem;
      color: #1a4a1a;
      font-style: italic;
      border-top: 3px dashed #66bb6a;
      padding-top: 0.8rem;
      width: 80%;
    }
    .poster-star {
      font-size: 2.5rem;
      color: #f9a825;
      filter: drop-shadow(0 0 15px #f9a825);
      margin: 10px 0;
    }

    .signature {
      text-align: center;
      color: #1e4a2a;
      font-weight: 500;
      margin-top: 30px;
      font-size: 1.2rem;
    }

    /* interactive glow */
    .glow-pulse {
      animation: pulseGlow 2s infinite;
    }
    @keyframes pulseGlow {
      0% { box-shadow: 0 0 20px #4caf50; }
      50% { box-shadow: 0 0 50px #66bb6a, 0 0 80px #388e3c; }
      100% { box-shadow: 0 0 20px #4caf50; }
    }

    #bgMusic { display: none; }
    .footer-note {
      margin-top: 20px;
      font-size: 1.1rem;
      color: #1e4a2a;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <!-- floating items -->
  <div class="floating-container" id="floatingContainer"></div>

  <!-- Canvas for self-drawing heart + name -->
  <canvas id="heartCanvas"></canvas>

  <!-- GATE: password "mirlovesyoucynthia" -->
  <div id="gatePanel" class="glass-panel gate-container">
    <h1><i class="fas fa-heart"></i> MIR JUNIOR <i class="fas fa-heart"></i></h1>
    <p>✨ for Cynthia ✨</p>
    <div class="password-box">
      <input type="password" id="passwordInput" class="password-input" placeholder="• • • • • •" autofocus>
    </div>
    <button class="enter-btn" id="enterBtn"><i class="fas fa-lock-open"></i> open</button>
    <div id="errorMsg" class="error-message"></div>
    <div style="margin-top: 20px; opacity: 0.8;">❤️ type the secret word ❤️</div>
  </div>

  <!-- MAIN PAGE -->
  <div id="gracePage" class="grace-page">
    <div class="main-inner">
      <div class="grace-header">
        <h2><i class="fas fa-heart"></i> MIR JUNIOR <i class="fas fa-heart"></i></h2>
      </div>

      <!-- Letter card -->
      <div class="letter-card" id="showLetterCard">
        <i class="fas fa-envelope-open-heart"></i>
        <h3>a letter for you, Babe</h3>
        <p>touch to open the words..!</p>
      </div>

      <!-- Letter display -->
      <div id="letterDisplay" class="letter-paper" style="display: none;">
        <div class="letter-content" id="letterText"></div>
      </div>

      <!-- POSTER: girl of the day — Cynthia -->
      <div class="poster-grace" id="posterGrace">
        <div class="poster-star"><i class="fas fa-star"></i> <i class="fas fa-star"></i> <i class="fas fa-star"></i></div>
        <div class="poster-title">girl of the day</div>
        <div class="poster-name">Cynthia</div>
        <div class="poster-sub">— my Babe —</div>
        <div class="poster-star"><i class="fas fa-heart"></i> <i class="fas fa-heart"></i> <i class="fas fa-heart"></i></div>
      </div>

      <div class="signature">
        <i class="far fa-heart"></i> with all my heart, yours <i class="far fa-heart"></i>
      </div>
      <div class="footer-note"><i class="fas fa-leaf"></i> always & forever <i class="fas fa-leaf"></i></div>
    </div>
  </div>

  <!-- Background music: James Blake - Godspeed -->
  <audio id="bgMusic" loop>
    <source src="James Blake - Godspeed (Official Video) - James Blake.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {
      // ---- CONFIG ----
      const SECRET_PASSWORD = "mirlovesyoucynthia";
      const NICKNAME = "Babe";
      const DISPLAY_NAME = "Cynthia";

      // ---- DOM refs ----
      const gate = document.getElementById('gatePanel');
      const gracePage = document.getElementById('gracePage');
      const passwordInput = document.getElementById('passwordInput');
      const enterBtn = document.getElementById('enterBtn');
      const errorMsg = document.getElementById('errorMsg');
      const body = document.body;
      const bgMusic = document.getElementById('bgMusic');
      const floatingContainer = document.getElementById('floatingContainer');
      const canvas = document.getElementById('heartCanvas');
      const ctx = canvas.getContext('2d');

      let musicStarted = false;
      let floatInterval;

      // ---- floating items ----
      const symbols = ['🌹', '❤️', '🌸', '💖', '🌺', '💘', '🏵️', '💕', '🌷', '💗', '🥀', '💓', '🍀', '🌿', '💚'];

      function createFloatingItem() {
        const item = document.createElement('div');
        item.className = 'float-item';
        item.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        const size = Math.floor(Math.random() * 32 + 18);
        item.style.fontSize = size + 'px';
        item.style.left = Math.random() * 100 + '%';
        item.style.animationDuration = (Math.random() * 12 + 10) + 's';
        item.style.animationDelay = Math.random() * -12 + 's';
        floatingContainer.appendChild(item);
        setTimeout(() => item.remove(), 22000);
      }

      function startFloating() {
        if (floatInterval) clearInterval(floatInterval);
        for (let i = 0; i < 30; i++) {
          setTimeout(() => createFloatingItem(), i * 60);
        }
        floatInterval = setInterval(createFloatingItem, 350);
        floatingContainer.style.visibility = 'visible';
      }

      // ---- Heart + name drawing ----
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      function drawHeartWithName(progress, nameProgress) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#2e7d32';
        ctx.lineWidth = 6;
        ctx.shadowColor = '#66bb6a';
        ctx.shadowBlur = 24;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const size = Math.min(canvas.width, canvas.height) * 0.35;

        const pts = [];
        const steps = 100;
        for (let i = 0; i <= steps; i++) {
          const t = (i / steps) * 2 * Math.PI;
          const x = 16 * Math.pow(Math.sin(t), 3);
          const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
          pts.push({ x, y });
        }
        const scaled = pts.map(p => ({
          x: cx + (p.x / 20) * size,
          y: cy + (p.y / 20) * size
        }));

        const drawTo = Math.floor(steps * progress);
        ctx.beginPath();
        ctx.moveTo(scaled[0].x, scaled[0].y);
        for (let i = 1; i <= drawTo; i++) {
          ctx.lineTo(scaled[i].x, scaled[i].y);
        }
        ctx.stroke();

        if (progress >= 1) {
          ctx.shadowColor = '#388e3c';
          ctx.shadowBlur = 30;
          ctx.font = `italic bold ${80 * nameProgress}px 'Sacramento', cursive`;
          ctx.fillStyle = '#1b5e20';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const label = `${DISPLAY_NAME} ❤️`;
          ctx.fillText(label, cx, cy - 10);
        }
      }

      function startHeartDrawing(callback) {
        canvas.style.display = 'block';
        let heartStart = null;
        let nameStart = null;
        let heartDone = false;
        const heartDuration = 3000;
        const nameDuration = 2200;

        function animate(timestamp) {
          if (!heartStart) heartStart = timestamp;
          const heartElapsed = timestamp - heartStart;
          const heartProgress = Math.min(heartElapsed / heartDuration, 1);

          if (!heartDone) {
            drawHeartWithName(heartProgress, 0);
            if (heartProgress >= 1) {
              heartDone = true;
              nameStart = timestamp;
            }
            requestAnimationFrame(animate);
          } else {
            const nameElapsed = timestamp - nameStart;
            const nameProgress = Math.min(nameElapsed / nameDuration, 1);
            drawHeartWithName(1, nameProgress);
            if (nameProgress >= 1) {
              setTimeout(() => {
                canvas.style.display = 'none';
                if (callback) callback();
              }, 400);
            } else {
              requestAnimationFrame(animate);
            }
          }
        }
        requestAnimationFrame(animate);
      }

      // ---- music ----
      function playMusic() {
        bgMusic.play().catch(e => console.log('Music play prevented', e));
      }

      // ---- grant access ----
      function grantAccess() {
        if (!musicStarted) {
          playMusic();
          musicStarted = true;
        } else {
          bgMusic.play();
        }
        gate.style.display = 'none';

        startHeartDrawing(() => {
          startFloating();
          gracePage.style.display = 'block';
          body.style.background = 'radial-gradient(circle at 20% 30%, #e8f5e9, #a5d6a7)';
          // extra green glow
          document.querySelector('.main-inner').classList.add('glow-pulse');
        });
      }

      // ---- password check ----
      function checkPasswordAndEnter() {
        const entered = passwordInput.value.trim();
        if (entered === SECRET_PASSWORD) {
          errorMsg.innerHTML = '';
          grantAccess();
        } else {
          errorMsg.innerHTML = '✘ only "mirlovesyoucynthia" opens the heart ✘';
          passwordInput.style.borderColor = '#c62828';
          passwordInput.value = '';
          passwordInput.focus();
        }
      }

      enterBtn.addEventListener('click', (e) => {
        e.preventDefault();
        checkPasswordAndEnter();
      });

      passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          checkPasswordAndEnter();
        } else {
          errorMsg.innerHTML = '';
          passwordInput.style.borderColor = 'rgba(76, 175, 80, 0.5)';
        }
      });

      window.addEventListener('load', () => passwordInput.focus());

      // ---- LETTER CONTENT (updated, no Valentine, includes nickname) ----
      const fullLetter = `Dear Cynthia, ❤️

Today is a special day for me because today we started loving each other. I am really happy, and I thank God that you are now a special part of my life.

It is funny to think that we were friends before. Back then, you were in S1 and I was in S3. We never knew that one day our friendship would become something so beautiful. Life really surprises us.

I want you to know that I will always respect you, care for you, and be honest with you. I know we are just starting this journey, but I hope we will keep making happy memories together, one day at a time.

Your smile makes my day brighter. Every time you smile, it makes me smile too. I hope I can always give you reasons to smile because seeing you happy makes me happy.

Thank you for being the amazing person you are. Thank you for your kindness, your heart, and for giving us a chance. I promise to support you, listen to you, and treat you with love and respect.

Let's take things one step at a time, enjoy every moment together, and keep building something beautiful. No matter what happens, I will always value the friendship that brought us here.

I hope this is the beginning of many happy days, many laughs, and many beautiful memories.

Take care of yourself, keep smiling, and never forget that you are special to me.

With love,
Mir ❤️`;

      const showLetterCard = document.getElementById('showLetterCard');
      const letterDisplay = document.getElementById('letterDisplay');
      const letterText = document.getElementById('letterText');
      letterText.innerText = fullLetter;

      showLetterCard.addEventListener('click', () => {
        if (letterDisplay.style.display === 'none' || letterDisplay.style.display === '') {
          letterDisplay.style.display = 'block';
          letterDisplay.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
          letterDisplay.style.display = 'none';
        }
      });

      // ---- extra interactivity: poster click effect ----
      const poster = document.getElementById('posterGrace');
      poster.addEventListener('click', function() {
        this.style.transform = 'scale(0.97)';
        setTimeout(() => { this.style.transform = 'scale(1.02)'; }, 150);
        setTimeout(() => { this.style.transform = 'scale(1)'; }, 300);
        // sparkle effect (console love)
        console.log('💚 You touched the poster, Babe! 💚');
      });

      // ---- extra: double-click on header to toggle green glow ----
      const header = document.querySelector('.grace-header h2');
      if (header) {
        header.addEventListener('dblclick', function() {
          const inner = document.querySelector('.main-inner');
          inner.classList.toggle('glow-pulse');
        });
      }

      // ---- extra: key hint (show password hint on ESC) ----
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && gate.style.display !== 'none') {
          errorMsg.innerHTML = '💚 hint: mirlovesyoucynthia';
        }
      });

    })();
  </script>
</body>
</html>
